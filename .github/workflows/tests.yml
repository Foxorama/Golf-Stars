name: tests

on:
  push:
    branches: ['**']
  pull_request:

# Supersede an in-flight run when a newer commit lands on the same ref, so a stale PASS from
# an older commit can never satisfy auto-merge's required check over fresh code. Don't cancel
# on `main` (group is per-ref) — only redundant feature-branch/PR runs are cancelled.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Install Chromium so the real-browser boot test (tests/build.test.ts) runs in CI —
      # it's the guard that catches "builds fine but doesn't run in a browser".
      - run: npx playwright-core install --with-deps chromium
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
