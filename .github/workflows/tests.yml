name: tests

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Install Chromium so the real-browser boot test (tests/build.test.ts) runs in CI —
      # it's the guard that catches "builds fine but doesn't run in a browser".
      - run: npx playwright-core install --with-deps chromium
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
