<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Always revalidate index.html so a new deploy never serves a stale page that
         points at a content-hashed asset that no longer exists (the assets themselves
         are safe to cache forever). Best-effort on GitHub Pages, where we don't control
         HTTP headers. -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Golf Stars</title>
    <!-- PWA: installable as an app. The manifest + icons are external files copied verbatim
         into dist/ (NOT inlined by vite-plugin-singlefile) — an install manifest can't be a
         data-URI. Hrefs are relative so they resolve under the Pages subpath (/golf-stars/). -->
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="theme-color" content="#0b0d12" />
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
    <link rel="apple-touch-icon" href="icon-180.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Golf Stars" />
    <style>
      /* ───────────────────────────────────────────────────────────────────────
         Golf Stars — design tokens + component classes (UI polish pass).
         The DOM shell (app.ts / cards.ts) is styled freely here; the SVG render
         layer is deterministic and untouched. Tokens live as CSS variables so the
         whole theme shifts from one place; component classes carry the hover/
         active/focus states that pure inline styles can't express.
         ─────────────────────────────────────────────────────────────────────── */
      :root {
        --gs-bg: #0b0d12;          /* app background (matches the intro sky handoff) */
        --gs-bg-2: #11141b;        /* card / panel fill */
        --gs-panel: #161b25;       /* slightly raised surface */
        --gs-ink: #e8e8ea;         /* primary text */
        --gs-dim: #9aa1ad;         /* muted text */
        --gs-line: #2a3142;        /* default border */
        --gs-line-2: #1c2029;      /* hairline / divider */
        --gs-accent: #5fd45a;      /* primary green (calls to action) */
        --gs-info: #9fd8e6;        /* info cyan */
        --gs-danger: #ff6b6b;      /* miss / penalty */
        --gs-gold: #e08a2b;        /* outpost / shards */
        --gs-warn: #ffc454;        /* spray edge / caution */
        --gs-r: 10px;              /* control radius */
        --gs-r-lg: 14px;           /* card radius */
        --gs-shadow: 0 2px 10px rgba(0, 0, 0, .45);
        color-scheme: dark;
      }

      * { box-sizing: border-box; }
      html { -webkit-text-size-adjust: 100%; }
      body {
        margin: 0;
        background: var(--gs-bg);
        color: var(--gs-ink);
        /* A faint cosmic vignette so flat panels sit on a living sky, not a slab. */
        background-image:
          radial-gradient(1100px 620px at 78% -8%, #18203044 0%, transparent 60%),
          radial-gradient(900px 520px at 12% 4%, #1a162a3a 0%, transparent 58%);
        background-attachment: fixed;
      }
      .gs-main {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        max-width: 820px; margin: 0 auto;
        /* Respect the notch / home-indicator on installed PWAs (viewport-fit=cover). The
           top/bottom insets are mirrored in .gs-shot's height math below so the fixed play
           screen still fits exactly without scrolling. */
        padding:
          calc(18px + env(safe-area-inset-top)) calc(16px + env(safe-area-inset-right))
          calc(28px + env(safe-area-inset-bottom)) calc(16px + env(safe-area-inset-left));
        color: var(--gs-ink); min-height: 100vh;
      }
      .gs-main h1, .gs-main h2, .gs-main h3 { letter-spacing: .2px; }
      ::selection { background: #5fd45a44; }

      /* ── Buttons ─────────────────────────────────────────────────────────── */
      .gs-btn {
        font: 600 14px/1.15 system-ui, sans-serif;
        padding: 9px 14px;
        border-radius: var(--gs-r);
        border: 1px solid var(--btn-border, var(--gs-line));
        background: linear-gradient(180deg, #232838, #191d27);
        color: var(--gs-ink);
        cursor: pointer;
        margin: 3px 4px 3px 0;
        -webkit-tap-highlight-color: transparent;
        /* manipulation kills the 300ms tap delay + double-tap-zoom on controls; no text
           selection so a fast tap or a map drag never selects a label. */
        touch-action: manipulation;
        user-select: none; -webkit-user-select: none;
        transition: transform .07s ease, box-shadow .16s ease,
                    border-color .16s ease, filter .16s ease, background .16s ease;
      }
      .gs-btn:hover {
        border-color: var(--btn-hover, #46506a);
        filter: brightness(1.13);
        box-shadow: 0 3px 14px rgba(0, 0, 0, .42);
      }
      .gs-btn:active { transform: translateY(1px); filter: brightness(.97); }
      .gs-btn:focus-visible { outline: 2px solid var(--gs-info); outline-offset: 2px; }
      .gs-btn[disabled] {
        opacity: .5; cursor: default; filter: none; transform: none; box-shadow: none;
        background: #15171d; color: #6a7080; border-color: #22262f;
      }
      .gs-btn--block { display: block; width: 100%; text-align: left; }
      .gs-btn--primary {
        --btn-border: #2f8c3a;
        background: linear-gradient(180deg, #1f5e2d, #163a20);
        color: #ecffe9;
      }
      .gs-btn--primary:hover { --btn-hover: var(--gs-accent); box-shadow: 0 0 16px rgba(95, 212, 90, .32); }
      .gs-btn--ghost { background: linear-gradient(180deg, #1a1e27, #14171f); color: var(--gs-dim); }
      .gs-btn--ghost:hover { color: var(--gs-ink); }
      .gs-btn--on {
        --btn-border: var(--gs-accent);
        background: linear-gradient(180deg, #1d4a2a, #163a20);
        color: #ecffe9;
        box-shadow: 0 0 12px rgba(95, 212, 90, .22);
      }

      /* ── Panels, banners, chips ──────────────────────────────────────────── */
      .gs-panel {
        border: 1px solid var(--gs-line);
        border-radius: var(--gs-r-lg);
        background: linear-gradient(180deg, #141823, var(--gs-bg-2));
        padding: 12px 14px; margin: 8px 0;
        box-shadow: var(--gs-shadow);
      }
      .gs-format { transition: border-color .16s ease, transform .12s ease, box-shadow .16s ease; }
      .gs-format:hover { border-color: #39435a; transform: translateY(-1px); box-shadow: var(--gs-shadow); }
      .gs-chip {
        display: inline-flex; align-items: center; gap: 6px;
        font-size: 13px; padding: 4px 10px; border-radius: 999px;
        border: 1px solid var(--gs-line); background: #ffffff08;
      }
      .gs-clickcard { transition: transform .12s ease, filter .16s ease; }
      .gs-clickcard:hover { transform: translateY(-3px); filter: brightness(1.08); }
      .gs-clickcard:active { transform: translateY(-1px); }

      /* ── Collapsible section (Trade Market accordion) ────────────────────── */
      .gs-acc {
        border: 1px solid var(--gs-line); border-radius: var(--gs-r-lg);
        background: var(--gs-bg-2); margin: 10px 0; overflow: hidden;
      }
      .gs-acc__head {
        width: 100%; display: flex; align-items: center; gap: 9px;
        padding: 11px 14px; border: 0; cursor: pointer;
        background: linear-gradient(180deg, #161b25, #12151d);
        color: var(--gs-ink); font: inherit; text-align: left;
        -webkit-tap-highlight-color: transparent; touch-action: manipulation;
        transition: background .16s ease;
      }
      .gs-acc__head:hover { background: linear-gradient(180deg, #1b2130, #141823); }
      .gs-acc__head:focus-visible { outline: 2px solid var(--gs-info); outline-offset: -2px; }
      .gs-acc__icon { font-size: 17px; line-height: 1; }
      .gs-acc__title { font-size: 15px; font-weight: 700; }
      .gs-acc__count {
        font-size: 11.5px; color: var(--gs-dim); font-variant-numeric: tabular-nums;
        border: 1px solid var(--gs-line); border-radius: 999px; padding: 1px 8px;
      }
      .gs-acc__chev {
        margin-left: auto; font-size: 13px; color: var(--gs-dim);
        transition: transform .2s ease;
      }
      .gs-acc--collapsed .gs-acc__chev { transform: rotate(-90deg); }
      .gs-acc__body { padding: 8px 10px 12px; }
      .gs-acc--collapsed .gs-acc__body { display: none; }
      .gs-acc__blurb { font-size: 12px; opacity: .6; margin: .2em 0 .6em; text-align: center; }
      .gs-acc__rack { display: flex; flex-wrap: wrap; justify-content: center; }

      /* ── Settings cog (fixed, top-right) ─────────────────────────────────── */
      .gs-cog {
        position: fixed;
        top: calc(10px + env(safe-area-inset-top));
        right: calc(12px + env(safe-area-inset-right));
        z-index: 60;
        width: 42px; height: 42px;
        display: flex; align-items: center; justify-content: center;
        font-size: 22px; line-height: 1;
        border-radius: 50%;
        border: 1px solid var(--gs-line);
        background: radial-gradient(circle at 40% 35%, #232838, #14171f);
        color: var(--gs-dim); cursor: pointer; box-shadow: var(--gs-shadow);
        -webkit-tap-highlight-color: transparent; touch-action: manipulation;
        transition: transform .25s ease, color .16s ease, border-color .16s ease, filter .16s ease;
      }
      .gs-cog:hover { color: var(--gs-ink); border-color: #46506a; filter: brightness(1.1); transform: rotate(50deg); }
      .gs-cog:active { filter: brightness(.95); }
      .gs-cog:focus-visible { outline: 2px solid var(--gs-info); outline-offset: 2px; }

      /* ── Nav doorways: the Trade Market / Clubhouse tiles on the title ────── */
      .gs-navtiles { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 10px 0 16px; }
      @media (max-width: 460px) { .gs-navtiles { grid-template-columns: 1fr; } }
      .gs-navtile {
        position: relative; display: block; width: 100%; min-height: 134px; padding: 0;
        border-radius: var(--gs-r-lg); border: 1px solid var(--gs-line);
        background: var(--gs-bg-2); color: var(--gs-ink); cursor: pointer; overflow: hidden;
        text-align: left; -webkit-tap-highlight-color: transparent; touch-action: manipulation;
        box-shadow: var(--gs-shadow);
        transition: transform .14s ease, box-shadow .18s ease, border-color .16s ease, filter .16s ease;
      }
      .gs-navtile:hover { transform: translateY(-3px); border-color: #46506a; filter: brightness(1.05); box-shadow: 0 8px 22px rgba(0, 0, 0, .5); }
      .gs-navtile:active { transform: translateY(-1px); }
      .gs-navtile:focus-visible { outline: 2px solid var(--gs-info); outline-offset: 2px; }
      .gs-navtile--market { border-color: #4a3a5e; }
      .gs-navtile--clubhouse { border-color: #4a3a22; }
      .gs-navtile__art { position: absolute; inset: 0; display: block; }
      .gs-navtile__art svg { display: block; width: 100%; height: 100%; }
      .gs-navtile__cap {
        position: absolute; left: 0; right: 0; bottom: 0;
        display: flex; flex-direction: column; gap: 2px; padding: 28px 14px 12px;
        background: linear-gradient(180deg, transparent, rgba(8, 9, 14, .88) 62%);
      }
      .gs-navtile__title { font: 700 18px/1.1 system-ui, sans-serif; }
      .gs-navtile__sub { font-size: 12px; opacity: .82; }

      /* ── Clubhouse: tap-to-restyle character stage + garage bay + slot picker ─ */
      .gs-cstage {
        position: relative; margin: 8px auto 6px; max-width: 340px; min-height: 250px;
        border: 1px solid var(--gs-line); border-radius: var(--gs-r-lg); overflow: hidden;
        background:
          radial-gradient(115% 74% at 50% 4%, #26304e 0%, transparent 58%),
          radial-gradient(52% 30% at 50% 100%, rgba(255, 255, 255, .07), transparent 72%),
          linear-gradient(180deg, #12141d, #0b0d12);
      }
      .gs-cstage__figure { position: relative; z-index: 1; display: flex; justify-content: center; padding: 12px 0 8px; }
      .gs-cstage__figure svg { height: 232px; width: auto; filter: drop-shadow(0 7px 11px rgba(0, 0, 0, .55)); }
      /* Invisible tap band over one body part; a floating chip names the worn piece. */
      .gs-czone {
        position: absolute; left: 0; right: 0; z-index: 3; display: flex; align-items: center;
        padding: 0 10px; border: 0; background: transparent; cursor: pointer;
        -webkit-tap-highlight-color: transparent; touch-action: manipulation;
      }
      .gs-czone::before {
        content: ''; position: absolute; inset: 6px 28% 6px 28%;
        border: 1.6px dashed transparent; border-radius: 44px;
        transition: border-color .16s ease, background .16s ease;
      }
      .gs-czone:hover::before { border-color: #ffffff55; background: #ffffff0f; }
      .gs-czone:focus-visible { outline: none; }
      .gs-czone:focus-visible::before { border-color: var(--gs-info); }
      .gs-czone--active::before { border-color: var(--gs-warn); background: #ffc45416; }
      .gs-czone--hat   { top: 1%;  height: 27%; justify-content: flex-end; }
      .gs-czone--shirt { top: 28%; height: 30%; justify-content: flex-start; }
      .gs-czone--pants { top: 58%; height: 41%; justify-content: flex-end; }
      .gs-czone__chip {
        position: relative; z-index: 4; display: inline-flex; align-items: center; gap: 5px;
        max-width: 47%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        font: 700 11.5px/1 system-ui, sans-serif; color: var(--gs-ink);
        padding: 5px 9px; border-radius: 999px;
        background: rgba(10, 12, 18, .84); border: 1px solid var(--gs-line); box-shadow: var(--gs-shadow);
      }
      .gs-czone--active .gs-czone__chip { border-color: var(--gs-warn); color: var(--gs-warn); }
      .gs-czone__pen { opacity: .55; font-weight: 400; }
      .gs-clubset {
        text-align: center; margin: 2px 0 8px; font: 700 12px/1 system-ui, sans-serif; color: #ff4fd8;
      }
      .gs-clubhint { text-align: center; font-size: 12.5px; opacity: .6; margin: 8px 0 4px; }

      /* The garage bay tile — a wide tap target that opens the ride picker. */
      .gs-garage {
        position: relative; display: block; width: 100%; margin: 4px 0 2px; min-height: 130px;
        padding: 0; overflow: hidden; border-radius: var(--gs-r-lg); border: 1px solid #35507a;
        background: var(--gs-bg-2); color: var(--gs-ink); cursor: pointer; box-shadow: var(--gs-shadow);
        -webkit-tap-highlight-color: transparent; touch-action: manipulation;
        transition: transform .14s ease, box-shadow .18s ease, border-color .16s ease, filter .16s ease;
      }
      .gs-garage:hover { transform: translateY(-2px); border-color: #5a7db0; filter: brightness(1.06); box-shadow: 0 8px 22px rgba(0, 0, 0, .5); }
      .gs-garage:active { transform: translateY(0); }
      .gs-garage:focus-visible { outline: 2px solid var(--gs-info); outline-offset: 2px; }
      .gs-garage--active { border-color: var(--gs-warn); box-shadow: 0 0 0 1px var(--gs-warn), var(--gs-shadow); }
      .gs-garage__art { position: absolute; inset: 0; display: block; }
      .gs-garage__art svg { display: block; width: 100%; height: 100%; }
      .gs-garage__cap {
        position: absolute; left: 0; right: 0; bottom: 0; display: flex; align-items: flex-end;
        justify-content: space-between; gap: 8px; padding: 26px 12px 11px;
        background: linear-gradient(180deg, transparent, rgba(8, 9, 14, .9) 66%);
      }
      .gs-garage__name { display: block; font: 700 15px/1.15 system-ui, sans-serif; }
      .gs-garage__sub { display: block; font-size: 11.5px; opacity: .78; text-transform: capitalize; }
      .gs-garage__edit {
        flex: none; align-self: flex-end; font: 700 11px/1 system-ui, sans-serif; color: var(--gs-warn);
        padding: 5px 9px; border: 1px solid var(--gs-warn); border-radius: 999px; background: rgba(10, 12, 18, .72);
        white-space: nowrap;
      }

      /* The revealed slot picker (owned rack for the tapped slot). */
      .gs-cpick {
        border: 1px solid var(--gs-warn); border-radius: var(--gs-r-lg);
        background: linear-gradient(180deg, #171a24, var(--gs-bg-2)); margin: 10px 0 4px; padding: 10px 10px 12px;
        animation: gsPickIn .18s ease;
      }
      @keyframes gsPickIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: none; } }
      .gs-cpick__head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
      .gs-cpick__title { font: 700 15px/1 system-ui, sans-serif; }
      .gs-cpick__done {
        margin-left: auto; font: 700 12px/1 system-ui, sans-serif; color: var(--gs-dim);
        background: transparent; border: 1px solid var(--gs-line); border-radius: 999px; padding: 5px 11px; cursor: pointer;
        -webkit-tap-highlight-color: transparent; touch-action: manipulation; transition: color .16s ease, border-color .16s ease;
      }
      .gs-cpick__done:hover { color: var(--gs-ink); border-color: #46506a; }
      .gs-cpick__rack { display: flex; flex-wrap: wrap; justify-content: center; }
      .gs-cpick__empty { text-align: center; font-size: 12.5px; opacity: .75; padding: 4px 0 8px; }

      /* ── Scorecard table ─────────────────────────────────────────────────── */
      .gs-scorecard { border-collapse: collapse; font-size: 13px; width: 100%; }
      .gs-scorecard th { padding: 2px 8px; opacity: .55; text-align: left; font-weight: 600; }
      .gs-scorecard td { padding: 3px 8px; }
      .gs-scorecard tr[data-action] { cursor: pointer; transition: background .12s ease; }
      .gs-scorecard tr[data-action]:hover { background: #1d212c; }

      /* Interactive play layout (GS-mechanics #3): map + controls side-by-side on wide screens;
         on mobile, a big map with the Hit action bar pinned to the bottom of the viewport so it
         never needs scrolling to reach. */
      .gs-play { display: flex; gap: 18px; align-items: flex-start; }
      .gs-map { flex: 0 1 460px; max-width: 60%; }
      .gs-map svg { display: block; width: 100%; height: auto; touch-action: none; }
      .gs-controls { flex: 1 1 250px; min-width: 230px; }
      @media (max-width: 640px) {
        .gs-play { flex-direction: column; gap: 10px; }
        .gs-map { width: 100%; max-width: 100%; flex: none; display: flex; justify-content: center; }
        .gs-map svg { width: auto; height: auto; max-height: 56vh; max-width: 100%; }
        .gs-controls { width: 100%; }
        .gs-hitbar {
          position: sticky; bottom: 0; z-index: 20; display: flex; gap: 8px;
          background: linear-gradient(180deg, transparent, var(--gs-bg) 28%);
          padding: 10px 0 8px; box-shadow: 0 -10px 16px var(--gs-bg);
        }
        .gs-hitbar .gs-btn { flex: 1; margin: 0; padding: 13px 10px; font-size: 16px; text-align: center; }
      }

      /* Uplifted shot screen (the map IS the screen): a full-height flex column — compact stat
         bar on top, the map filling ALL the leftover space, club/strategy/hit at the bottom.
         Sizing the map as the flex remainder (not a fixed vh) means the controls always fit
         under it without a scroll or an overlapping sticky footer. */
      .gs-shot {
        display: flex; flex-direction: column; gap: 8px;
        /* Fixed to the viewport (not min-height) + overflow-hidden so the play screen NEVER
           scrolls — the map absorbs the slack and the club/aim/Hit controls always sit on
           screen without scrolling down to reach them. The 46px is .gs-main's vertical
           padding (18+28); the safe-area insets are subtracted too since .gs-main now adds
           them to its padding, so the math stays exact on notched phones. */
        height: calc(100vh - 46px);
        height: calc(100dvh - 46px - env(safe-area-inset-top) - env(safe-area-inset-bottom));
        overflow: hidden;
      }
      .gs-topbar {
        flex: 0 0 auto;
        display: flex; flex-direction: column; gap: 3px;
        padding: 7px 12px; border: 1px solid var(--gs-line); border-radius: var(--gs-r);
        background: linear-gradient(180deg, #141823, var(--gs-bg-2));
      }
      .gs-topbar .gs-stats {
        display: flex; align-items: center; gap: 13px; flex-wrap: wrap;
        font-size: 14px; color: var(--gs-dim);
      }
      .gs-topbar .gs-stats b { color: var(--gs-ink); }
      .gs-topbar .gs-sub { font-size: 12px; opacity: .82; line-height: 1.5; }
      /* The lie is the player's most decision-relevant fact — a bordered, colour-coded chip
         (green ok / amber caution / red trouble) right in the sub-line, with its carry+spray hit. */
      .gs-liechip {
        display: inline-flex; align-items: center; gap: 4px;
        font-size: 12px; padding: 1px 8px; border-radius: 999px;
        border: 1px solid currentColor; white-space: nowrap;
      }
      /* Momentum rail — one pip per hole, coloured by score; current ringed, upcoming dim. */
      .gs-pips { display: flex; gap: 4px; align-items: center; margin-top: 1px; }
      .gs-pip {
        width: 10px; height: 10px; border-radius: 3px; flex: 0 0 auto;
        background: #2a3142; box-shadow: inset 0 0 0 1px rgba(0,0,0,.25);
      }
      .gs-pip--cur { box-shadow: 0 0 0 2px var(--gs-info); background: #3a4356; }
      .gs-shotscore {
        margin-left: auto; font-weight: 700; font-size: 13px;
        padding: 2px 11px; border-radius: 999px; border: 1px solid currentColor;
      }
      .gs-bigmap {
        /* min-height:0 lets the map shrink to whatever the topbar + controls leave, so the
           controls never get pushed below the fold. position:relative anchors the nav overlay. */
        flex: 1 1 0; min-height: 0; position: relative;
        display: flex; justify-content: center; align-items: center;
        border: 1px solid var(--gs-line); border-radius: var(--gs-r);
        overflow: hidden; box-shadow: var(--gs-shadow); touch-action: none;
      }
      .gs-bigmap svg { display: block; height: 100%; width: 100%; touch-action: none; }
      .gs-bigmap canvas { display: block; max-width: 100%; max-height: 100%; object-fit: contain; }
      /* Map navigation overlay — floats on the map (top-right) so it needs no scrolling. */
      .gs-mapctrl {
        position: absolute; top: 8px; right: 8px; z-index: 5;
        display: flex; flex-direction: column; gap: 6px;
      }
      .gs-mapbtn {
        width: 38px; height: 38px; padding: 0; margin: 0;
        font: 600 17px/1 system-ui, sans-serif;
        display: flex; align-items: center; justify-content: center;
        border-radius: 9px; border: 1px solid var(--gs-line);
        background: rgba(17, 20, 27, .82); color: var(--gs-ink);
        cursor: pointer; -webkit-tap-highlight-color: transparent;
        touch-action: manipulation; user-select: none; -webkit-user-select: none;
        backdrop-filter: blur(2px);
        transition: filter .14s ease, border-color .14s ease, background .14s ease;
      }
      .gs-mapbtn:hover { filter: brightness(1.18); border-color: #46506a; }
      .gs-mapbtn:active { filter: brightness(.95); }
      .gs-mapbtn[disabled] { opacity: .4; cursor: default; filter: none; }
      .gs-mapbtn--on {
        border-color: var(--gs-accent); background: rgba(29, 74, 42, .9);
        box-shadow: 0 0 10px rgba(95, 212, 90, .25);
      }
      .gs-bottom { flex: 0 0 auto; display: flex; flex-direction: column; gap: 5px; }
      .gs-ctrlrow { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }

      .gs-charcard-top { display: flex; gap: 12px; align-items: center; }
      .gs-charcard-port {
        flex: 0 0 auto; display: grid; place-items: center; width: 96px; height: 104px;
        border-radius: 12px; background: radial-gradient(60% 60% at 50% 40%, #1b2230, #0d1018);
        border: 1px solid color-mix(in srgb, var(--cc) 30%, var(--gs-line));
      }
      .gs-charcard-id { flex: 1 1 auto; min-width: 0; }
      .gs-charcard-name { display: block; font-size: 18px; line-height: 1.15; text-shadow: 0 0 14px color-mix(in srgb, var(--cc) 55%, transparent); }
      .gs-charcard-org { font-size: 11.5px; opacity: .65; margin-top: 3px; }
      .gs-charcard-blurb { font-size: 12.5px; opacity: .9; margin: 0; line-height: 1.45; }
      .gs-charcard-stats { display: grid; gap: 5px; padding: 2px 0; }
      .gs-stat { display: grid; grid-template-columns: 30px 1fr; align-items: center; gap: 8px; }
      .gs-stat-l { font-size: 10px; font-weight: 700; letter-spacing: .6px; opacity: .6; }
      .gs-stat-rail { height: 7px; border-radius: 999px; background: #ffffff12; overflow: hidden; }
      .gs-stat-fill {
        display: block; height: 100%; width: var(--w); border-radius: 999px;
        box-shadow: 0 0 8px -1px currentColor;
        animation: gs-stat-grow .6s .15s cubic-bezier(.2,.7,.3,1) both;
      }
      @keyframes gs-stat-grow { from { width: 0; } to { width: var(--w); } }
      .gs-charcard-pc { list-style: none; padding: 0; margin: 0; font-size: 12px; line-height: 1.55; }
      .gs-charcard-pc .gs-pc-i { display: inline-block; width: 14px; }
      .gs-charcard-cta {
        margin-top: auto; display: flex; align-items: center; justify-content: center; gap: 6px;
        font-size: 13.5px; font-weight: 700; padding: 9px 12px; border-radius: var(--gs-r);
        color: var(--cc); border: 1px solid color-mix(in srgb, var(--cc) 55%, transparent);
        background: color-mix(in srgb, var(--cc) 12%, transparent);
        transition: background .16s ease, color .16s ease, box-shadow .16s ease;
      }
      @media (hover: hover) {
        .gs-charcard:hover .gs-charcard-cta {
          color: #0b0d12; background: var(--cc);
          box-shadow: 0 0 18px -2px color-mix(in srgb, var(--cc) 70%, transparent);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .gs-charcard, .gs-stat-fill { animation: none; opacity: 1; transform: none; }
        .gs-charcard:hover .gs-charcard-sheen { animation: none; }
      }
      /* Journey map (GS-galaxy-map): a scrollable travelled trail + a pinned forward-routes panel.
         The trail strip scrolls horizontally (tap-scroll back through cleared worlds); the forward
         panel is a flex sibling OUTSIDE the scroll area, so it stays stuck to the right edge. */
      /* The starfield is one CONTINUOUS background spanning BOTH panels (a tiled star pattern + two
         nebula smears), so the scrollable trail and the pinned forward panel share one seamless sky —
         no starless gap, no hard seam. The SVGs on top are transparent. */
      .gs-journey {
        position: relative; display: flex; align-items: stretch;
        border: 1px solid var(--gs-line); border-radius: 10px; overflow: hidden;
        background-color: #070a12;
        background-image:
          radial-gradient(1.3px 1.3px at 18px 24px, rgba(223,231,255,0.75), transparent),
          radial-gradient(1px 1px at 64px 78px, rgba(223,231,255,0.55), transparent),
          radial-gradient(1px 1px at 112px 36px, rgba(207,223,255,0.6), transparent),
          radial-gradient(1.5px 1.5px at 150px 104px, rgba(223,231,255,0.6), transparent),
          radial-gradient(1px 1px at 40px 132px, rgba(191,230,255,0.5), transparent),
          radial-gradient(1px 1px at 96px 162px, rgba(223,231,255,0.45), transparent),
          radial-gradient(120% 95% at 72% 22%, rgba(58,95,176,0.30), transparent 62%),
          radial-gradient(95% 85% at 18% 88%, rgba(107,58,160,0.24), transparent 62%);
        background-size: 180px 180px, 180px 180px, 180px 180px, 180px 180px, 180px 180px, 180px 180px, 100% 100%, 100% 100%;
        background-repeat: repeat, repeat, repeat, repeat, repeat, repeat, no-repeat, no-repeat;
      }
      .gs-journey-trail {
        flex: 1 1 auto; min-width: 0; overflow-x: auto; overflow-y: hidden;
        scrollbar-width: thin; -webkit-overflow-scrolling: touch; touch-action: pan-x;
      }
      .gs-journey-trail::-webkit-scrollbar { height: 5px; }
      .gs-journey-trail::-webkit-scrollbar-thumb { background: var(--gs-line); border-radius: 3px; }
      /* Pinned routes-ahead panel — never scrolls. It shares the parent's continuous sky (transparent
         background), so it blends into the trail with no seam; the trail's bridge meets the wagon here. */
      .gs-journey-fwd {
        flex: 0 0 auto; position: relative;
      }
      /* Current-world caption under the map (the panel's wagon only shows "YOU"). */
      .gs-journey-here {
        margin: 6px 2px 0; font-size: 11.5px; color: var(--gs-dim);
      }
      .gs-journey-here b { color: #ffce54; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <!-- Probe: does ANY ES module execute in this browser? If modules are unsupported or
         the bundle fails to parse, this never sets the flag and the watchdog reports it. -->
    <script type="module">
      window.__gsModuleRan = true;
    </script>
    <!-- Fallback that runs ONLY in browsers without ES-module support. -->
    <script nomodule>
      window.__gsNoModule = true;
    </script>
    <!-- Boot watchdog: turn a blank page into a visible error. Runs before the deferred
         module, so it catches asset-load failures, module-eval throws, and async errors
         that the app's own try/catch can't reach.

         CRITICAL: a throw during top-level evaluation of ANY imported module aborts the
         whole bundle *before* the entry's own try/catch runs — so that guard can never
         catch this class of fault. Only these global handlers can. They MUST record the
         error into window.__gsErr (so the 5s report includes it) and MUST NOT be clobbered
         by the timeout. window.onerror is the one that yields source:line:col, which
         pinpoints the throw inside the single-line minified bundle. -->
    <script>
      (function () {
        // Polyfill globalThis for older module-capable engines that lack it (some mobile
        // WebViews): esbuild does NOT inject it, so any globalThis reference would throw.
        if (typeof globalThis === 'undefined') { try { window.globalThis = window; } catch (e) {} }
        var BUILD = 'inline-35'; // bump each deploy; proves which HTML you actually loaded
        var app = document.getElementById('app');
        var errorShown = false; // once a REAL error is on screen, the timeout must not clobber it
        // Immediate visible marker so you can tell the NEW page loaded at all.
        if (app) {
          app.innerHTML =
            '<pre style="color:#9fd8e6;white-space:pre-wrap;padding:16px;margin:0;' +
            'font:12px/1.5 monospace;background:#0b0d12;min-height:100vh;">⛳ Golf Stars — loading… (build ' +
            BUILD + ')</pre>';
        }
        // Defensive: Golf Stars IS now a PWA, but it shares an origin with other projects
        // (e.g. a golf-finder PWA) whose root-scoped service worker could intercept and blank
        // this page. So nuke only FOREIGN workers/caches — anything not scoped to our own
        // subpath, and any cache not named `golf-stars-*` — while leaving our own offline
        // worker intact. (Our worker registers from the app module; see app.ts.)
        try {
          var ourScope = new URL('./', location.href).href; // e.g. https://host/golf-stars/
          if (navigator.serviceWorker) {
            navigator.serviceWorker.getRegistrations().then(function (rs) {
              rs.forEach(function (r) { if (r.scope !== ourScope) r.unregister(); });
            }).catch(function () {});
          }
          if (window.caches && caches.keys) {
            caches.keys().then(function (ks) {
              ks.forEach(function (k) { if (k.indexOf('golf-stars-') !== 0) caches.delete(k); });
            }).catch(function () {});
          }
        } catch (e) {}
        function paint(msg, isError) {
          if (app && app.getAttribute('data-booted') !== '1') {
            app.innerHTML =
              '<pre style="color:' + (isError ? '#ff8a8a' : '#9fd8e6') + ';white-space:pre-wrap;padding:16px;margin:0;' +
              'font:12px/1.5 monospace;background:#0b0d12;min-height:100vh;">⛳ Golf Stars (build ' +
              BUILD + ') — ' + msg + '</pre>';
          }
        }
        // Record + show a real boot error. Persists into __gsErr so the 5s report carries
        // it too, and latches errorShown so the timeout can't overwrite the real cause.
        function fail(detail) {
          if (!window.__gsErr) window.__gsErr = detail; // keep the FIRST (root) error
          errorShown = true;
          paint('boot error:\n' + window.__gsErr, true);
        }
        // Classic onerror gives source:line:col — the only thing that locates a throw
        // inside the minified single-line bundle. Keep it first.
        window.onerror = function (msg, src, line, col, error) {
          fail(
            String(msg) + '\n  at ' + (src || '?') + ':' + (line || '?') + ':' + (col || '?') +
            ((error && error.stack) ? '\n' + error.stack : '')
          );
          return false; // don't swallow; let the console see it too
        };
        window.addEventListener('error', function (e) {
          // Resource-load errors (e.g. a 404'd asset) have no message but DO have a target.
          if (e && e.target && e.target !== window && (e.target.src || e.target.href)) {
            fail('failed to load resource: ' + (e.target.src || e.target.href));
            return;
          }
          var m = (e && (e.message || (e.error && e.error.message))) || 'unknown error';
          fail(m + '\n  at ' + ((e && e.filename) || '?') + ':' + ((e && e.lineno) || '?') + ':' + ((e && e.colno) || '?') +
            ((e && e.error && e.error.stack) ? '\n' + e.error.stack : ''));
        }, true); // capture phase so resource errors (which don't bubble) are seen
        window.addEventListener('unhandledrejection', function (e) {
          var r = e && e.reason;
          fail('promise rejection: ' + ((r && (r.stack || r.message)) || r || 'unknown'));
        });
        setTimeout(function () {
          if (errorShown) return; // the real error is already on screen — never clobber it
          var hasMod = 'noModule' in HTMLScriptElement.prototype;
          paint(
            'app did not run within 5s.\n' +
            '• boot stage: ' + (window.__gsStage || '(never started — app module did not run)') + '\n' +
            '• boot error: ' + (window.__gsErr || '(none captured)') + '\n' +
            '• ES modules supported: ' + hasMod + '\n' +
            '• test module ran: ' + (!!window.__gsModuleRan) + '\n' +
            '• UA: ' + navigator.userAgent + '\n' +
            'URL: ' + location.href,
            true
          );
        }, 5000);
      })();
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
