<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Always revalidate index.html so a new deploy never serves a stale page that
         points at a content-hashed asset that no longer exists (the assets themselves
         are safe to cache forever). Best-effort on GitHub Pages, where we don't control
         HTTP headers. -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Golf Stars</title>
    <!-- PWA: installable as an app. The manifest + icons are external files copied verbatim
         into dist/ (NOT inlined by vite-plugin-singlefile) — an install manifest can't be a
         data-URI. Hrefs are relative so they resolve under the Pages subpath (/golf-stars/). -->
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="theme-color" content="#0b0d12" />
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
    <link rel="apple-touch-icon" href="icon-180.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Golf Stars" />
    <style>
      /* ───────────────────────────────────────────────────────────────────────
         Golf Stars — design tokens + component classes (UI polish pass).
         The DOM shell (app.ts / cards.ts) is styled freely here; the SVG render
         layer is deterministic and untouched. Tokens live as CSS variables so the
         whole theme shifts from one place; component classes carry the hover/
         active/focus states that pure inline styles can't express.
         ─────────────────────────────────────────────────────────────────────── */
      :root {
        --gs-bg: #0b0d12;          /* app background (matches the intro sky handoff) */
        --gs-bg-2: #11141b;        /* card / panel fill */
        --gs-panel: #161b25;       /* slightly raised surface */
        --gs-ink: #e8e8ea;         /* primary text */
        --gs-dim: #9aa1ad;         /* muted text */
        --gs-line: #2a3142;        /* default border */
        --gs-line-2: #1c2029;      /* hairline / divider */
        --gs-accent: #5fd45a;      /* primary green (calls to action) */
        --gs-info: #9fd8e6;        /* info cyan */
        --gs-danger: #ff6b6b;      /* miss / penalty */
        --gs-gold: #e08a2b;        /* outpost / shards */
        --gs-warn: #ffc454;        /* spray edge / caution */
        --gs-r: 10px;              /* control radius */
        --gs-r-lg: 14px;           /* card radius */
        --gs-shadow: 0 2px 10px rgba(0, 0, 0, .45);
        color-scheme: dark;
      }

      * { box-sizing: border-box; }
      html { -webkit-text-size-adjust: 100%; }
      body {
        margin: 0;
        background: var(--gs-bg);
        color: var(--gs-ink);
        /* A faint cosmic vignette so flat panels sit on a living sky, not a slab. */
        background-image:
          radial-gradient(1100px 620px at 78% -8%, #18203044 0%, transparent 60%),
          radial-gradient(900px 520px at 12% 4%, #1a162a3a 0%, transparent 58%);
        background-attachment: fixed;
      }
      .gs-main {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        max-width: 820px; margin: 0 auto; padding: 18px 16px 28px;
        color: var(--gs-ink); min-height: 100vh;
      }
      .gs-main h1, .gs-main h2, .gs-main h3 { letter-spacing: .2px; }
      ::selection { background: #5fd45a44; }

      /* ── Buttons ─────────────────────────────────────────────────────────── */
      .gs-btn {
        font: 600 14px/1.15 system-ui, sans-serif;
        padding: 9px 14px;
        border-radius: var(--gs-r);
        border: 1px solid var(--btn-border, var(--gs-line));
        background: linear-gradient(180deg, #232838, #191d27);
        color: var(--gs-ink);
        cursor: pointer;
        margin: 3px 4px 3px 0;
        -webkit-tap-highlight-color: transparent;
        transition: transform .07s ease, box-shadow .16s ease,
                    border-color .16s ease, filter .16s ease, background .16s ease;
      }
      .gs-btn:hover {
        border-color: var(--btn-hover, #46506a);
        filter: brightness(1.13);
        box-shadow: 0 3px 14px rgba(0, 0, 0, .42);
      }
      .gs-btn:active { transform: translateY(1px); filter: brightness(.97); }
      .gs-btn:focus-visible { outline: 2px solid var(--gs-info); outline-offset: 2px; }
      .gs-btn[disabled] {
        opacity: .5; cursor: default; filter: none; transform: none; box-shadow: none;
        background: #15171d; color: #6a7080; border-color: #22262f;
      }
      .gs-btn--block { display: block; width: 100%; text-align: left; }
      .gs-btn--primary {
        --btn-border: #2f8c3a;
        background: linear-gradient(180deg, #1f5e2d, #163a20);
        color: #ecffe9;
      }
      .gs-btn--primary:hover { --btn-hover: var(--gs-accent); box-shadow: 0 0 16px rgba(95, 212, 90, .32); }
      .gs-btn--ghost { background: linear-gradient(180deg, #1a1e27, #14171f); color: var(--gs-dim); }
      .gs-btn--ghost:hover { color: var(--gs-ink); }
      .gs-btn--on {
        --btn-border: var(--gs-accent);
        background: linear-gradient(180deg, #1d4a2a, #163a20);
        color: #ecffe9;
        box-shadow: 0 0 12px rgba(95, 212, 90, .22);
      }

      /* ── Panels, banners, chips ──────────────────────────────────────────── */
      .gs-panel {
        border: 1px solid var(--gs-line);
        border-radius: var(--gs-r-lg);
        background: linear-gradient(180deg, #141823, var(--gs-bg-2));
        padding: 12px 14px; margin: 8px 0;
        box-shadow: var(--gs-shadow);
      }
      .gs-format { transition: border-color .16s ease, transform .12s ease, box-shadow .16s ease; }
      .gs-format:hover { border-color: #39435a; transform: translateY(-1px); box-shadow: var(--gs-shadow); }
      .gs-chip {
        display: inline-flex; align-items: center; gap: 6px;
        font-size: 13px; padding: 4px 10px; border-radius: 999px;
        border: 1px solid var(--gs-line); background: #ffffff08;
      }
      .gs-clickcard { transition: transform .12s ease, filter .16s ease; }
      .gs-clickcard:hover { transform: translateY(-3px); filter: brightness(1.08); }
      .gs-clickcard:active { transform: translateY(-1px); }

      /* ── Scorecard table ─────────────────────────────────────────────────── */
      .gs-scorecard { border-collapse: collapse; font-size: 13px; width: 100%; }
      .gs-scorecard th { padding: 2px 8px; opacity: .55; text-align: left; font-weight: 600; }
      .gs-scorecard td { padding: 3px 8px; }
      .gs-scorecard tr[data-action] { cursor: pointer; transition: background .12s ease; }
      .gs-scorecard tr[data-action]:hover { background: #1d212c; }

      /* Interactive play layout (GS-mechanics #3): map + controls side-by-side on wide screens;
         on mobile, a big map with the Hit action bar pinned to the bottom of the viewport so it
         never needs scrolling to reach. */
      .gs-play { display: flex; gap: 18px; align-items: flex-start; }
      .gs-map { flex: 0 1 460px; max-width: 60%; }
      .gs-map svg { display: block; width: 100%; height: auto; touch-action: none; }
      .gs-controls { flex: 1 1 250px; min-width: 230px; }
      @media (max-width: 640px) {
        .gs-play { flex-direction: column; gap: 10px; }
        .gs-map { width: 100%; max-width: 100%; flex: none; display: flex; justify-content: center; }
        .gs-map svg { width: auto; height: auto; max-height: 56vh; max-width: 100%; }
        .gs-controls { width: 100%; }
        .gs-hitbar {
          position: sticky; bottom: 0; z-index: 20; display: flex; gap: 8px;
          background: linear-gradient(180deg, transparent, var(--gs-bg) 28%);
          padding: 10px 0 8px; box-shadow: 0 -10px 16px var(--gs-bg);
        }
        .gs-hitbar .gs-btn { flex: 1; margin: 0; padding: 13px 10px; font-size: 16px; text-align: center; }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <!-- Probe: does ANY ES module execute in this browser? If modules are unsupported or
         the bundle fails to parse, this never sets the flag and the watchdog reports it. -->
    <script type="module">
      window.__gsModuleRan = true;
    </script>
    <!-- Fallback that runs ONLY in browsers without ES-module support. -->
    <script nomodule>
      window.__gsNoModule = true;
    </script>
    <!-- Boot watchdog: turn a blank page into a visible error. Runs before the deferred
         module, so it catches asset-load failures, module-eval throws, and async errors
         that the app's own try/catch can't reach.

         CRITICAL: a throw during top-level evaluation of ANY imported module aborts the
         whole bundle *before* the entry's own try/catch runs — so that guard can never
         catch this class of fault. Only these global handlers can. They MUST record the
         error into window.__gsErr (so the 5s report includes it) and MUST NOT be clobbered
         by the timeout. window.onerror is the one that yields source:line:col, which
         pinpoints the throw inside the single-line minified bundle. -->
    <script>
      (function () {
        // Polyfill globalThis for older module-capable engines that lack it (some mobile
        // WebViews): esbuild does NOT inject it, so any globalThis reference would throw.
        if (typeof globalThis === 'undefined') { try { window.globalThis = window; } catch (e) {} }
        var BUILD = 'inline-34'; // bump each deploy; proves which HTML you actually loaded
        var app = document.getElementById('app');
        var errorShown = false; // once a REAL error is on screen, the timeout must not clobber it
        // Immediate visible marker so you can tell the NEW page loaded at all.
        if (app) {
          app.innerHTML =
            '<pre style="color:#9fd8e6;white-space:pre-wrap;padding:16px;margin:0;' +
            'font:12px/1.5 monospace;background:#0b0d12;min-height:100vh;">⛳ Golf Stars — loading… (build ' +
            BUILD + ')</pre>';
        }
        // Defensive: Golf Stars IS now a PWA, but it shares an origin with other projects
        // (e.g. a golf-finder PWA) whose root-scoped service worker could intercept and blank
        // this page. So nuke only FOREIGN workers/caches — anything not scoped to our own
        // subpath, and any cache not named `golf-stars-*` — while leaving our own offline
        // worker intact. (Our worker registers from the app module; see app.ts.)
        try {
          var ourScope = new URL('./', location.href).href; // e.g. https://host/golf-stars/
          if (navigator.serviceWorker) {
            navigator.serviceWorker.getRegistrations().then(function (rs) {
              rs.forEach(function (r) { if (r.scope !== ourScope) r.unregister(); });
            }).catch(function () {});
          }
          if (window.caches && caches.keys) {
            caches.keys().then(function (ks) {
              ks.forEach(function (k) { if (k.indexOf('golf-stars-') !== 0) caches.delete(k); });
            }).catch(function () {});
          }
        } catch (e) {}
        function paint(msg, isError) {
          if (app && app.getAttribute('data-booted') !== '1') {
            app.innerHTML =
              '<pre style="color:' + (isError ? '#ff8a8a' : '#9fd8e6') + ';white-space:pre-wrap;padding:16px;margin:0;' +
              'font:12px/1.5 monospace;background:#0b0d12;min-height:100vh;">⛳ Golf Stars (build ' +
              BUILD + ') — ' + msg + '</pre>';
          }
        }
        // Record + show a real boot error. Persists into __gsErr so the 5s report carries
        // it too, and latches errorShown so the timeout can't overwrite the real cause.
        function fail(detail) {
          if (!window.__gsErr) window.__gsErr = detail; // keep the FIRST (root) error
          errorShown = true;
          paint('boot error:\n' + window.__gsErr, true);
        }
        // Classic onerror gives source:line:col — the only thing that locates a throw
        // inside the minified single-line bundle. Keep it first.
        window.onerror = function (msg, src, line, col, error) {
          fail(
            String(msg) + '\n  at ' + (src || '?') + ':' + (line || '?') + ':' + (col || '?') +
            ((error && error.stack) ? '\n' + error.stack : '')
          );
          return false; // don't swallow; let the console see it too
        };
        window.addEventListener('error', function (e) {
          // Resource-load errors (e.g. a 404'd asset) have no message but DO have a target.
          if (e && e.target && e.target !== window && (e.target.src || e.target.href)) {
            fail('failed to load resource: ' + (e.target.src || e.target.href));
            return;
          }
          var m = (e && (e.message || (e.error && e.error.message))) || 'unknown error';
          fail(m + '\n  at ' + ((e && e.filename) || '?') + ':' + ((e && e.lineno) || '?') + ':' + ((e && e.colno) || '?') +
            ((e && e.error && e.error.stack) ? '\n' + e.error.stack : ''));
        }, true); // capture phase so resource errors (which don't bubble) are seen
        window.addEventListener('unhandledrejection', function (e) {
          var r = e && e.reason;
          fail('promise rejection: ' + ((r && (r.stack || r.message)) || r || 'unknown'));
        });
        setTimeout(function () {
          if (errorShown) return; // the real error is already on screen — never clobber it
          var hasMod = 'noModule' in HTMLScriptElement.prototype;
          paint(
            'app did not run within 5s.\n' +
            '• boot stage: ' + (window.__gsStage || '(never started — app module did not run)') + '\n' +
            '• boot error: ' + (window.__gsErr || '(none captured)') + '\n' +
            '• ES modules supported: ' + hasMod + '\n' +
            '• test module ran: ' + (!!window.__gsModuleRan) + '\n' +
            '• UA: ' + navigator.userAgent + '\n' +
            'URL: ' + location.href,
            true
          );
        }, 5000);
      })();
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
